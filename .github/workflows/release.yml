name: release

# Build the production Docker image and push to GitHub Container Registry.
#
# Triggered automatically on `v*` tag pushes (e.g. `git tag v0.1.2 && git push
# --tags`) and manually via the Actions UI for one-off rebuilds. The image is
# pushed to ghcr.io/crit-fumble/cfg-server-disrecord with three tags per build:
#   - the git ref (e.g. v0.1.2)
#   - latest (only on default-branch tags)
#   - sha-<short-sha> (always)
#
# Mirrors cfg-core-server's release.yml — same registry / token / BuildKit
# secret contract for installing private @crit-fumble/* packages.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.2). Used only for naming when run manually.'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/crit-fumble/cfg-server-disrecord
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            npmrc=//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
